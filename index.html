<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StatQuest: Weekly Modules</title>
</head>
<body>
  <h1>StatQuest: Weekly Modules</h1>
  <p>Week 1</p>

  <button onclick="openTutorial()">Open Tutorial</button>

  <p>
    Direct link:
    <a href="https://dbkmsu.shinyapps.io/Rtut1web/" target="_self">Open directly</a>
  </p>

  <script>
    const weekCatalog = [
      {
        file: 'week1.json',
        label: 'Week 1',
        tutorialUrl: 'https://dbkmsu.shinyapps.io/Rtut1web/'
      }
    ];

    let currentWeekFile = 'week1.json';

    function getWeekMeta(file) {
      return weekCatalog.find(w => w.file === file);
    }

    function openTutorial() {
      const meta = getWeekMeta(currentWeekFile);
      if (!meta || !meta.tutorialUrl) return;
      window.location.href = meta.tutorialUrl;
    }

    function checkForTutorialReturn() {
      const params = new URLSearchParams(window.location.search);
      const week = params.get('week');
      const tutorial = params.get('tutorial');

      if (!week || tutorial !== 'complete') return;

      alert('Tutorial marked complete.');
      history.replaceState({}, '', window.location.pathname);
    }

    checkForTutorialReturn();
  </script>
</body>
</html>
