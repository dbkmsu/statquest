<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatQuest: Policy Lab</title>
</head>
<body>
<h1>StatQuest: Policy Lab (Updated)</h1>

<script>
const weekCatalog = [
  { file:'week1.json', label:'Week 1: Research questions', lecture:'week1_lecture1.html' },
  { file:'week2.json', label:'Week 2: Measurement', lecture:'week2_lecture1.html' },
  { file:'week3.json', label:'Week 3: Sampling and bias', lecture:'week3_lecture1.html' },
  { file:'week4.json', label:'Week 4: Research design and causality', lecture:'week4_lecture1.html' },
  { file:'week5.json', label:'Week 5: Significance and errors', lecture:'week5_lecture1.html' },
  { file:'week6.json', label:'Week 6: Correlation vs causation', lecture:'week6_lecture1.html' },
  { file:'week7.json', label:'Week 7: Regression and prediction', lecture:'week7_lecture1.html' }
];

function startWeek(week) {
  if (week.lecture) {
    window.location.href = week.lecture + "?return_case=" + week.file;
  } else {
    alert("No lecture for this week.");
  }
}

document.write("<h2>Select a week</h2>");
weekCatalog.forEach(w => {
  document.write(`<button onclick="startWeek(weekCatalog[${weekCatalog.indexOf(w)}])">${w.label}</button><br><br>`);
});
</script>

</body>
</html>
